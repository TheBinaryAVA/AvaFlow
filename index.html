<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To-Do App by Avanthika</title>
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK -->
  <script type="module">
    // Firebase App (the core Firebase SDK) is always required
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  </script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  
  <header>
    <h1>My To-Do</h1>
    <div>
      <button id="toggleThemeBtn" class="theme-toggle">
  <span class="icon-sun">☀️</span>
  <span class="icon-moon">🌙</span>
</button>
      <span id="clock"></span>
    </div>
  </header>

  <main>
    <form id="taskForm">
      <input type="text" id="taskText" placeholder="Enter Task" required>
      <select id="taskCategory">
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
        <option value="Study">Study</option>
         <option value="Health">Health</option>
  <option value="Finance">Finance</option>
  <option value="Shopping">Shopping</option>
  <option value="Chores">Chores</option>
  <option value="Events">Events</option>
      </select>
      <button type="submit">Add Task</button>
    </form>

    <div class="progress-section">
      <label>Today's Progress</label>
      <div id="progressBarContainer">
        <div id="progressBar"></div>
      </div>
      <span id="progressPercent"></span>
      <span id="streakCounter"></span>
    </div>

    


    <section id="filters">
      <select id="filterCategory">
        <option value="all">All Categories</option>
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
        <option value="Study">Study</option>
         <option value="Health">Health</option>
  <option value="Finance">Finance</option>
  <option value="Shopping">Shopping</option>
  <option value="Chores">Chores</option>
  <option value="Events">Events</option>
      </select>
      <select id="filterStatus">
        <option value="all">All Statuses</option>
        <option value="done">Completed</option>
        <option value="pending">Pending</option>
      </select>
    </section>

    <ul id="taskList"></ul>

    <div class="alarm-section">
      <label for="alarmTime">Alarm:</label>
      <input type="time" id="alarmTime">
      <button id="setAlarmBtn">Set Alarm</button>
      <span id="alarmStatus"></span>
      <!-- Hidden audio sound -->
      <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>
    </div>

    <canvas id="weeklyChart"></canvas>
  </main>

  <footer>
    <p>Avanthika's To do App | &copy; 2025</p>
  </footer>

  <!-- App script -->
  <script src="app.js" type="module"></script>
</body>
</html>
